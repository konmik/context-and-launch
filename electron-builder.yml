appId: com.context-launch.app
productName: "Context & Launch"
directories:
  output: dist-electron
files:
  - electron/main.js
  - .output/**/*
  - build-resources/**/*
  - package.json
  - "!node_modules"
asar: true
asarUnpack:
  - .output/**/*
extraMetadata:
  main: electron/main.js
win:
  target: nsis
  icon: build-resources/icon.ico
  artifactName: context-launch-setup.${ext}
nsis:
  oneClick: true
  perMachine: false
mac:
  target: dir
  icon: build-resources/icon.icns
linux:
  target: AppImage
  icon: build-resources/icon.png
