appId: com.context-launch.app
productName: "Context & Launch"
directories:
  output: dist-electron
files:
  - electron/main.js
  - .output/**/*
  - build-resources/**/*
  - package.json
  - "!node_modules"
asar: true
asarUnpack:
  - .output/**/*
extraResources:
  - from: config-defaults
    to: config-defaults
extraMetadata:
  main: electron/main.js
win:
  target: nsis
  icon: build-resources/icon.ico
  artifactName: context-launch-setup.${ext}
  executableName: context-launch
nsis:
  oneClick: true
  perMachine: false
mac:
  target: dmg
  icon: build-resources/icon.icns
  category: public.app-category.developer-tools
  artifactName: context-launch-setup.${ext}
dmg:
  title: "Context & Launch"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target: AppImage
  icon: build-resources/icon.png
